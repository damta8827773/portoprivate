services:
  mysql:
    image: mysql:8.0
    container_name: damta_portfolio_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-damta_portfolio}
      MYSQL_USER: ${MYSQL_USER:-damta}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-damtapass}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-p${MYSQL_ROOT_PASSWORD:-rootpass}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
